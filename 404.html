<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page Not Found | TraderBenny</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff;
    color: #0f1120;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 6vw;
    text-align: center;
  }
  .wrap { max-width: 520px; }
  .mono {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #2563eb;
    margin-bottom: 24px;
    display: inline-block;
    padding: 6px 16px;
    border: 1px solid rgba(37,99,235,0.3);
    border-radius: 3px;
  }
  h1 {
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1;
    margin-bottom: 16px;
  }
  h2 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: -0.015em;
  }
  p {
    color: #6b7280;
    line-height: 1.7;
    margin-bottom: 36px;
  }
  a.btn {
    display: inline-block;
    padding: 13px 30px;
    background: #2563eb;
    color: white;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-radius: 4px;
    transition: background .15s;
  }
  a.btn:hover { background: #1d4ed8; }
</style>
</head>
<body>
  <div class="wrap">
    <span class="mono">Error 404</span>
    <h1>Off the chart.</h1>
    <h2>This page doesn't exist.</h2>
    <p>Looks like price moved somewhere we weren't watching. Let's get you back to a level that's actually there.</p>
    <a href="/" class="btn">← Back to Home</a>
  </div>
</body>
</html>
